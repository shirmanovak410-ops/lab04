name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install CMake and compiler
      run: sudo apt-get update && sudo apt-get install -y cmake g++
    
    - name: Configure
      run: cmake -S . -B _build -DCMAKE_CXX_STANDARD=11
    
    - name: Build
      run: cmake --build _build
    
    - name: Run example1
      run: ./_build/example1
    
    - name: Run example2
      run: ./_build/example2
    
    - name: Show log
      run: cat log.txt || echo "No log file"
